name: Daily buy signal

# Runs once a day and emails a ranked digest: the top stocks/ETFs and top crypto
# currently cheapest vs. their own long-term trend (accumulation candidates).
# Requires two repo secrets: MAIL_USERNAME (your Gmail) and MAIL_PASSWORD
# (a Gmail App Password). The email is sent to MAIL_USERNAME (yourself), so your
# address never appears in this public repo.

on:
  schedule:
    - cron: "17 13 * * *"   # 13:17 UTC daily (off the :00 mark on purpose)
  workflow_dispatch: {}       # lets you run it manually to test

permissions:
  contents: write             # allow committing the updated paper-sandbox state

jobs:
  signal:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Advance paper sandbox (fake money, persisted)
        run: python -m src.paper

      - name: Compute signal
        id: sig
        run: python -m src.notify

      - name: Send daily digest email
        if: steps.sig.outputs.should_send == 'true'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: ${{ steps.sig.outputs.subject }}
          # Recipients: set the optional MAIL_TO secret to a comma-separated
          # list (e.g. you + others) to send to several people without putting
          # their addresses in this public repo. Falls back to just MAIL_USERNAME.
          to: ${{ secrets.MAIL_TO || secrets.MAIL_USERNAME }}
          from: Crypto Buy Signal <${{ secrets.MAIL_USERNAME }}>
          body: ${{ steps.sig.outputs.body }}

      - name: Persist paper-sandbox state
        if: always()           # keep the paper trail even if the email step fails
        continue-on-error: true # a push hiccup must never break the digest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add paper_state.json
          git commit -m "Update paper sandbox state [skip ci]" || echo "no changes"
          git push
