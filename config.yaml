# Configuration for the crypto research & backtesting tool.
# Everything here is for SIMULATION ONLY. No real money, no exchange keys.

data:
  exchange: coinbaseexchange  # crypto data source (verified reachable)
  symbols:                  # crypto pairs (fetched from Coinbase)
    - BTC/USD
    - ETH/USD
    - SOL/USD
    - XRP/USD
    - DOGE/USD
    - ADA/USD
    - LTC/USD
    - AVAX/USD
    - LINK/USD
  stocks:                   # stock/ETF tickers (fetched from Yahoo Finance)
    - AAPL
    - MSFT
    - NVDA
    - TSLA
    - AMZN
    - GOOGL
    - META
    - SPY                   # S&P 500 ETF — the classic buy-and-hold benchmark
    - QQQ                   # Nasdaq-100 ETF
  timeframe: 1d             # base fetch granularity (weekly/monthly are resampled)
  years: 12                 # how much daily history to pull (more than 5y for
                            # better long-term/monthly analysis; the app lets you
                            # slice to 1/3/5/10y or Max within this)
  # Note: stablecoins (USDC/USDT/DAI) are intentionally excluded — they're pegged
  # to ~$1, so there's nothing to chart, backtest, or signal.
  cache_dir: data/cache     # parquet cache location

# Simulated futures mechanics. These are the "real world" costs that
# quietly destroy most naive strategies -- tune them to see the effect.
backtest:
  initial_capital: 10000    # starting paper balance (USD)
  leverage: 1.0             # 1.0 = spot-like. Crank to 5/10/20 and watch liquidation.
  fee: 0.001                # taker fee per side (0.001 = 0.10%)
  slippage: 0.0005          # price slippage per trade (0.0005 = 0.05%)
  funding_rate: 0.0         # per-bar funding cost on held notional (perp approximation).
                            # Default 0 so buy-and-hold matches the spot market return.
                            # Real perps charge ~0.01%/8h (~0.03%/day). Try --funding 0.0003
                            # to see how funding quietly bleeds a long-held leveraged position.
  maintenance_margin: 0.005 # liquidation threshold (0.5% of notional)
  periods_per_year: 365     # crypto trades every day

analysis:
  rolling_window: 30        # window (in bars) for rolling vol/correlation

# Paper-trading sandbox: a fake-money forward test that persists across daily
# runs. The "agent" follows the walk-forward-best strategy for each symbol and is
# tracked against a buy-and-hold shadow, so you can see (going forward, true
# out-of-sample) whether the adaptive agent actually beats just holding. NO real
# money, no orders — simulation only.
paper:
  symbols: all              # "all" = every crypto + stock; or an explicit list
  stake: 50                 # fake dollars put into EACH market ($50 x 18 markets)
  state_file: paper_state.json
  select_metric: sharpe     # metric the agent uses to pick the best strategy

output_dir: outputs
